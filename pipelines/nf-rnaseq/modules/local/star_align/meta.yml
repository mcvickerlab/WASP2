# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "star_align"
description: Align RNA-seq reads to a reference genome using STAR with two-pass mode
keywords:
  - alignment
  - rna-seq
  - star
  - bam
  - spliced-alignment

tools:
  - star:
      description: "STAR: Spliced Transcripts Alignment to a Reference"
      homepage: "https://github.com/alexdobin/STAR"
      documentation: "https://github.com/alexdobin/STAR/blob/master/doc/STARmanual.pdf"
      doi: "10.1093/bioinformatics/bts635"
      licence: ["MIT"]
      identifier: biotools:star
  - samtools:
      description: "Tools for manipulating next-generation sequencing data"
      homepage: "https://www.htslib.org/"
      documentation: "https://www.htslib.org/doc/samtools.html"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT"]
      identifier: biotools:samtools

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'sample1', single_end:false ]
    - reads:
        type: file
        description: FASTQ files (single-end or paired-end)
        pattern: "*.{fq,fastq}{,.gz}"
  - - star_index:
        type: directory
        description: STAR genome index directory
  - - gtf:
        type: file
        description: GTF annotation file (optional)
        pattern: "*.gtf"

output:
  - bam:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'sample1', single_end:false ]
      - "*.Aligned.sortedByCoord.out.bam":
          type: file
          description: Coordinate-sorted BAM file
          pattern: "*.Aligned.sortedByCoord.out.bam"
      - "*.Aligned.sortedByCoord.out.bam.bai":
          type: file
          description: BAM index file
          pattern: "*.Aligned.sortedByCoord.out.bam.bai"
  - log_final:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'sample1', single_end:false ]
      - "*.Log.final.out":
          type: file
          description: STAR final alignment log with mapping statistics
          pattern: "*.Log.final.out"
  - log_out:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'sample1', single_end:false ]
      - "*.Log.out":
          type: file
          description: STAR main log file
          pattern: "*.Log.out"
  - sj_tab:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'sample1', single_end:false ]
      - "*.SJ.out.tab":
          type: file
          description: Splice junction table
          pattern: "*.SJ.out.tab"
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"

authors:
  - "@Jaureguy760"
maintainers:
  - "@Jaureguy760"
