# MultiQC configuration for nf-atacseq

report_comment: >
    This report has been generated by the <a href="https://github.com/nf-core/nf-atacseq/releases/tag/1.0.0" target="_blank">nf-core/nf-atacseq</a>
    analysis pipeline. For information about how to interpret these results, please see the
    <a href="https://nf-co.re/nf-atacseq/1.0.0/docs/output" target="_blank">documentation</a>.

report_section_order:
    nf-atacseq-methods-description:
        order: -1000
    software_versions:
        order: -1001
    wasp2-nf-atacseq-summary:
        order: -1002

export_plots: true

custom_logo: null
custom_logo_url: null
custom_logo_title: null

# Module order - processing order
module_order:
    - fastqc
    - fastp
    - bowtie2
    - samtools
    - picard

# Top modules to display
top_modules:
    - fastqc
    - fastp
    - samtools

# Table columns
table_columns_visible:
    FastQC:
        percent_duplicates: True
        percent_gc: True
        avg_sequence_length: True
        total_sequences: True
    Samtools:
        mapped_passed: True
        mapped_passed_pct: True

# Plot defaults
plots_force_flat: False
plots_force_interactive: True

# Sample name cleaning
fn_clean_sample_names: true
fn_clean_exts:
    - '.fastp'
    - '.sorted'
    - '.markdup'
    - '.wasp_filt'
    - '_fastqc'
    - '.bam'
    - '.sam'

# Extra config
extra_fn_clean_exts:
    - type: 'truncate'
      pattern: '_R1'
    - type: 'truncate'
      pattern: '_R2'
    - type: 'truncate'
      pattern: '_1'
    - type: 'truncate'
      pattern: '_2'

# General settings
show_analysis_paths: false
show_analysis_time: false
