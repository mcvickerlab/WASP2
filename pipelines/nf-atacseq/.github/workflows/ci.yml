name: nf-atacseq CI
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  release:
    types: [published]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

env:
  NXF_ANSI_LOG: false
  NFT_VER: "0.9.2"
  NFT_WORKDIR: ".nf-test"

jobs:
  test:
    name: "nf-test | ${{ matrix.NXF_VER }} | ${{ matrix.profile }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        NXF_VER:
          - "23.04.0"
          - "latest-everything"
        profile:
          - "test,docker"
          - "test_stub,docker"
    steps:
      - name: Check out pipeline code
        uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "${{ matrix.NXF_VER }}"

      - name: Setup nf-test
        uses: nf-core/setup-nf-test@v1
        with:
          version: "${{ env.NFT_VER }}"

      - name: Cache nf-test
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.NFT_WORKDIR }}
            ~/.nextflow/assets
          key: "${{ runner.os }}-nftest-${{ hashFiles('nf-test.config') }}-${{ hashFiles('**/*.nf') }}"
          restore-keys: |
            ${{ runner.os }}-nftest-${{ hashFiles('nf-test.config') }}-
            ${{ runner.os }}-nftest-

      - name: Run nf-test
        run: |
          nf-test test \
            --profile=${{ matrix.profile }} \
            --tap=test-output.tap \
            --verbose

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "nf-test-output-${{ matrix.NXF_VER }}-${{ strategy.job-index }}"
          path: test-output.tap
