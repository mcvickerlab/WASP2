# MultiQC configuration for nf-scatac

report_comment: >
    This report has been generated by the <a href="https://github.com/nf-core/nf-scatac/releases/tag/1.0.0" target="_blank">nf-core/nf-scatac</a>
    analysis pipeline. For information about how to interpret these results, please see the
    <a href="https://nf-co.re/nf-scatac/1.0.0/docs/output" target="_blank">documentation</a>.

report_section_order:
    nf-scatac-methods-description:
        order: -1000
    software_versions:
        order: -1001
    wasp2-nf-scatac-summary:
        order: -1002

export_plots: true

custom_logo: null
custom_logo_url: null
custom_logo_title: null

# Module order - processing order
module_order:
    - samtools
    - picard

# Top modules to display
top_modules:
    - samtools

# Table columns
table_columns_visible:
    Samtools:
        mapped_passed: True
        mapped_passed_pct: True
        reads_mapped: True

# Plot defaults
plots_force_flat: False
plots_force_interactive: True

# Sample name cleaning
fn_clean_sample_names: true
fn_clean_exts:
    - '.sorted'
    - '.wasp_filt'
    - '.fragments'
    - '.tsv'
    - '.gz'

# Extra config
extra_fn_clean_exts:
    - type: 'truncate'
      pattern: '_allele_counts'
    - type: 'truncate'
      pattern: '_imbalance'

# General settings
show_analysis_paths: false
show_analysis_time: false
