# WASP2 CI workflow
# Runs linting, Python tests (with Rust extension), and Rust tests
# Replaces the broken shared-workflow reference

name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Lint Python source with ruff (fast, no Rust build needed)
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@7eb50e6e20e1e2009087999ba91242e80253875f  # v7

      - name: Install ruff
        run: uv pip install --system ruff

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Check release metadata
        run: python scripts/release_version.py --check

  # ===========================================================================
  # Python tests with Rust extension (matrix: Python 3.10-3.13)
  # ===========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhts-dev \
            libbz2-dev \
            liblzma-dev \
            zlib1g-dev \
            libssl-dev \
            pkg-config \
            libclang-dev \
            samtools \
            bcftools \
            bedtools

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@7eb50e6e20e1e2009087999ba91242e80253875f  # v7

      - name: Create virtualenv and install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin
          maturin develop --release
          uv pip install -e ".[dev]" --no-build-isolation

      - name: Verify Rust extension loads
        run: |
          source .venv/bin/activate
          python -c "import wasp2_rust; print('wasp2_rust loaded:', wasp2_rust.__file__)"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short \
            -m "not benchmark and not sanity" \
            --ignore=tests/benchmarks \
            --ignore=tests/sanity

  # ===========================================================================
  # Rust unit tests and clippy lints
  # ===========================================================================
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhts-dev \
            libbz2-dev \
            liblzma-dev \
            zlib1g-dev \
            libssl-dev \
            pkg-config \
            libclang-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable
        with:
          components: clippy

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Run cargo test
        working-directory: rust
        run: PYO3_PYTHON=$(command -v python3) cargo test

      - name: Run clippy
        working-directory: rust
        run: PYO3_PYTHON=$(command -v python3) cargo clippy --all-targets -- -D warnings

      - name: Check Rust formatting
        working-directory: rust
        run: cargo fmt --check

  required:
    name: Required / Core
    if: always()
    needs: [lint, test, rust-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          RUST_RESULT: ${{ needs.rust-test.result }}
        run: |
          test "$LINT_RESULT" = success
          test "$TEST_RESULT" = success
          test "$RUST_RESULT" = success
