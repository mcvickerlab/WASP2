name: Security

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  python:
    name: Python audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@7eb50e6e20e1e2009087999ba91242e80253875f  # v7
      - name: Resolve auditable dependencies
        run: uv pip compile pyproject.toml --extra dev --output-file /tmp/wasp2-audit.txt
      - name: Audit Python dependencies
        run: uvx pip-audit==2.10.1 --requirement /tmp/wasp2-audit.txt
      - name: Run Bandit
        run: uvx --from 'bandit[toml]==1.9.4' bandit -c pyproject.toml -r src

  rust:
    name: Rust audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.0 --locked
      - name: Audit Rust dependencies
        working-directory: rust
        run: cargo audit

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version
      - name: Scan full Git history
        run: /tmp/gitleaks git --redact --verbose .

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4

  required:
    name: Required / Security
    if: always()
    needs: [python, rust, secrets, dependency-review]
    runs-on: ubuntu-latest
    steps:
      - name: Verify security jobs
        env:
          PYTHON_RESULT: ${{ needs.python.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          SECRETS_RESULT: ${{ needs.secrets.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
        run: |
          test "$PYTHON_RESULT" = success
          test "$RUST_RESULT" = success
          test "$SECRETS_RESULT" = success
          test "$DEPENDENCY_RESULT" = success || test "$DEPENDENCY_RESULT" = skipped
