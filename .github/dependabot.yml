version: 2
updates:
  # GitHub Actions SHA pinning only — monthly grouped updates
  # Python/Rust deps managed via conda-lock.yml and pixi.toml instead
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
